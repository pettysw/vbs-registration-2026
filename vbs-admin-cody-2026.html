<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS Admin Roster</title>
    <link rel="icon" type="image/png" href="ico.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="container" style="text-align: center;">
            <h1>Admin Login</h1>
            <p>Enter the passcode to view the child roster.</p>
            <div class="pass-wrapper">
                <input type="password" id="passInput" placeholder="Password">
                <button id="togglePass" onclick="window.toggleMyPass()">Show</button>
            </div>
            <div id="err" style="color:#e74c3c; margin:10px; font-weight:bold;"></div>
            <button id="loginBtn" onclick="window.adminLogin()">Login</button>
        </div>
    </div>

    <div id="adminContent" style="display:none;">
        <div class="container">
            <div class="csv-btn-center">
                <h2 style="white-space: nowrap;">VBS 2026 Roster</h2>
                <button onclick="window.downloadRoster()" id="downloadCSV">Download Roster</button>
                <span style="font-weight:bold;">Total Children: <span id="countDisplay">0</span></span>
            </div>
            <input type="text" id="adminSearch" placeholder="Search by name...">
            <ul id="explorerList"></ul>
        </div>
    </div>
    <script type="module" src="list.js"></script>
</body>
</html>
