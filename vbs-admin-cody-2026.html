<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS 2026 Admin Roster</title>
    <link rel="icon" type="image/png" href="ico.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay">
        <div class="container" style="text-align: center; margin-top: 50px;">
            <h1>Admin Login</h1>
            <p>Enter the passcode to view the child roster.</p>
            
            <div class="pass-wrapper">
                <input type="password" id="passInput" placeholder="Enter Password">
                <button id="togglePass" onclick="window.toggleMyPass()" style="width: auto; background-color: #7f8c8d;">Show</button>
            </div>
            
            <div id="err" style="color: #e74c3c; margin: 10px 0; font-weight: bold;"></div>
            
            <button id="loginBtn" onclick="window.adminLogin()" style="width: 200px; margin: 20px auto; display: block;">Login</button>
        </div>
    </div>

    <div id="adminContent" style="display: none;">
        <div class="container" style="max-width: 800px;">
            <div class="csv-btn-center">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2 style="white-space: nowrap; margin: 0;">VBS 2026 Roster</h2>
                    <button id="downloadCSV" onclick="window.downloadRoster()" style="width: auto; background-color: #27ae60; padding: 10px 20px;">Download Roster</button>
                    <span style="font-weight: bold; color: #1e3c72;">Total Children: <span id="countDisplay">0</span></span>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="adminSearch" placeholder="Search by child or parent name..." style="border-radius: 25px; padding: 10px 20px; border: 2px solid #1e3c72;">
            </div>

            <ul id="explorerList" style="padding: 0;">
                <p id="loadingMsg" style="text-align: center; color: #666;">Loading registrations...</p>
            </ul>
        </div>
    </div>

    <script type="module" src="list.js"></script>
</body>
</html>
